function normalizeEvent(e){if(Array.isArray(e)){return {time:e[0]||'12:00',name:e[1]||'',note:e[2]||'',googleQuery:e[3]||'',naverKeyword:e[4]||'',googleUrl:e[5]||'',naverUrl:e[6]||'',address:e[7]||'',website:e[8]||'',instagram:e[9]||'',stay:e[10]||'',category:e[11]||'景點',favorite:!!e[12],completed:!!e[13]}}return {time:e?.time||'12:00',name:e?.name||'',note:e?.note||'',googleQuery:e?.googleQuery||'',naverKeyword:e?.naverKeyword||'',googleUrl:e?.googleUrl||'',naverUrl:e?.naverUrl||'',address:e?.address||'',website:e?.website||'',instagram:e?.instagram||'',stay:e?.stay||'',category:e?.category||'景點',favorite:!!e?.favorite,completed:!!e?.completed}}
function normalizeDays(){days.forEach(d=>d.events=(d.events||[]).map(normalizeEvent))}
function cloneDefaults(){return JSON.parse(JSON.stringify(DEFAULT_DAYS))}
function loadLocalDays(){try{const raw=localStorage.getItem(STORAGE_KEY);const parsed=raw?JSON.parse(raw):cloneDefaults();const value=Array.isArray(parsed)&&parsed.length===5?parsed:cloneDefaults();value.forEach(d=>d.events=(d.events||[]).map(normalizeEvent));return value}catch(e){const value=cloneDefaults();value.forEach(d=>d.events=(d.events||[]).map(normalizeEvent));return value}}
function loadLocalMeta(){try{const raw=localStorage.getItem(STORAGE_KEY+'-meta');return {...DEFAULT_META,...(raw?JSON.parse(raw):{})}}catch(e){return {...DEFAULT_META}}}
function loadLocalShared(){try{const raw=localStorage.getItem(SHARED_STORAGE_KEY);if(!raw)return;const x=JSON.parse(raw);expenses=Array.isArray(x.expenses)?x.expenses:[];exchangeRates={...DEFAULT_RATES,...(x.exchangeRates||{})}}catch(e){}}
function sharedPayload(){return {days,tripMeta,expenses,exchangeRates,members:MEMBERS,updatedBy:'shared-web'}}
function saveLocal(){localStorage.setItem(STORAGE_KEY,JSON.stringify(days));localStorage.setItem(STORAGE_KEY+'-meta',JSON.stringify(tripMeta));localStorage.setItem(SHARED_STORAGE_KEY,JSON.stringify({expenses,exchangeRates}));const tip=document.getElementById('saveTip');if(tip){tip.textContent='已自動儲存 ✓';setTimeout(()=>tip.textContent='修改後會自動儲存',1200)}}
function setSyncStatus(text,ok=true){const el=document.getElementById('syncStatus');el.textContent=text;el.className='sync-badge '+(ok?'sync-ok':'sync-warn')}
function queueCloudSave(){if(isApplyingRemote)return;clearTimeout(syncTimer);syncTimer=setTimeout(saveCloud,500)}
async function saveCloud(){saveLocal();setSyncStatus('正在同步共用資料…',false);const {error}=await sb.from('trip_shared_state').upsert({share_id:SHARE_ID,data:sharedPayload(),updated_at:new Date().toISOString()},{onConflict:'share_id'});if(error){console.error(error);setSyncStatus('同步失敗，已保留本機資料',false)}else setSyncStatus('已同步，朋友可共同修改 ✓',true)}
async function loadCloud(){setSyncStatus('正在載入共用資料…',false);const {data,error}=await sb.from('trip_shared_state').select('data,updated_at').eq('share_id',SHARE_ID).maybeSingle();if(error){console.error(error);setSyncStatus('無法讀取 Supabase，暫用本機資料',false);return}if(data?.data){applyRemote(data.data)}else{await saveCloud()}}
function applyRemote(payload){isApplyingRemote=true;if(Array.isArray(payload.days)&&payload.days.length===5){days=payload.days;normalizeDays();}if(payload.tripMeta)tripMeta={...DEFAULT_META,...payload.tripMeta};if(Array.isArray(payload.expenses))expenses=payload.expenses;if(payload.exchangeRates)exchangeRates={...DEFAULT_RATES,...payload.exchangeRates};saveLocal();render();if(document.getElementById('expenseModal').classList.contains('open'))renderExpenseModal();isApplyingRemote=false;setSyncStatus('已同步，朋友可共同修改 ✓',true)}
function subscribeRealtime(){sb.channel('trip-'+SHARE_ID).on('postgres_changes',{event:'*',schema:'public',table:'trip_shared_state',filter:'share_id=eq.'+SHARE_ID},payload=>{if(payload.new?.data)applyRemote(payload.new.data)}).subscribe()}
function validUrl(v){try{const u=new URL(String(v||'').trim());return ['http:','https:'].includes(u.protocol)}catch(e){return false}}
function googleLink(e){e=normalizeEvent(e);if(validUrl(e.googleUrl))return e.googleUrl;const q=e.googleQuery||e.name||e.address||'Busan';return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(q+' Busan')}
function naverLink(e){e=normalizeEvent(e);if(validUrl(e.naverUrl))return e.naverUrl;const q=e.naverKeyword||e.address||e.name||'부산';return 'https://map.naver.com/p/search/'+encodeURIComponent(q)}
function maps(q){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent((q||'Busan')+' Busan')}
function naver(q){return 'https://map.naver.com/p/search/'+encodeURIComponent(q||'부산')}
function routeNames(d){return d.events.map(e=>normalizeEvent(e).name).filter(Boolean)}
function makeMap(names){const pts=names.slice(0,7);let s='<div class="mapbox"><div class="mapgrid"></div><div class="coast"></div>';pts.forEach((name,i)=>{const x=12+(i%4)*21;const y=18+Math.floor(i/4)*42+(i%2)*12;s+=`<span class="dot" style="left:${x}%;top:${y}%;color:${i===pts.length-1?'#e47c6b':'#4478a8'}"></span><span class="label" style="left:${Math.min(x+2,76)}%;top:${Math.max(y-3,3)}%">${escapeHtml(name)}</span>`});return s+'</div>'}
function escapeHtml(v){return String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function render(){document.getElementById('heroTitle').textContent=tripMeta.heroTitle||DEFAULT_META.heroTitle;document.getElementById('heroSubtitle').textContent=tripMeta.heroSubtitle||DEFAULT_META.heroSubtitle;const tabs=document.getElementById('tabs'),container=document.getElementById('days');tabs.innerHTML='';container.innerHTML='';days.forEach((d,i)=>{const tab=document.createElement('button');tab.className='tab '+(i===currentDay?'active':'');tab.innerHTML=`${escapeHtml(d.date.split('（')[0])}<br>${i+1}日`;tab.addEventListener('click',()=>goDay(i));tabs.appendChild(tab);const names=routeNames(d);const section=document.createElement('section');section.className='day '+(i===currentDay?'active':'');section.innerHTML=`<div class="title-card"><div class="dayno">DAY ${i+1}・${escapeHtml(d.date)}</div><h2>${escapeHtml(d.title)}</h2><div class="chips">${d.chips.map(c=>`<span class="chip">${escapeHtml(c)}</span>`).join('')}</div></div><div class="card"><h3>今日時間軸</h3><div class="timeline">${d.events.length?d.events.map(raw=>{const e=normalizeEvent(raw);return `<div class="event"><span class="time">${escapeHtml(e.time)}</span><b>${escapeHtml(e.name)}</b><p>${escapeHtml(e.note)}</p><div class="place-details">${e.category?`<span class="detail-chip">${escapeHtml(e.category)}</span>`:''}${e.address?`<span class="detail-chip">📍 ${escapeHtml(e.address)}</span>`:''}${e.stay?`<span class="detail-chip">⏱ ${escapeHtml(e.stay)}</span>`:''}</div><div class="event-flags">${e.favorite?'<span class="flag on">★ 收藏</span>':''}${e.completed?'<span class="flag done">✓ 已完成</span>':''}</div><div class="event-map-actions"><a class="google" href="${escapeHtml(googleLink(e))}" target="_blank" rel="noopener">Google Maps</a><a class="naver" href="${escapeHtml(naverLink(e))}" target="_blank" rel="noopener">NAVER Map</a></div>${e.website||e.instagram?`<div class="full-actions">${e.website&&validUrl(e.website)?`<a href="${escapeHtml(e.website)}" target="_blank" rel="noopener">官方網站</a>`:''}${e.instagram&&validUrl(e.instagram)?`<a href="${escapeHtml(e.instagram)}" target="_blank" rel="noopener">Instagram</a>`:''}</div>`:''}</div>`}).join(''):'<div class="empty">今天還沒有行程，點「編輯這天」新增地點。</div>'}</div><div class="btns edit-controls"><button class="btn edit day-edit" data-index="${i}">編輯這天</button><a class="btn alt" href="${maps(names.join(' '))}" target="_blank">Google 整日搜尋</a></div></div><div class="card"><h3>今日路線</h3>${makeMap(names)}<div class="route"><div class="route-line">${names.length?names.map((r,j)=>`${j?'<span class="arrow">→</span>':''}<span class="stop">${escapeHtml(r)}</span>`).join(''):'<span class="empty">尚無地點</span>'}</div></div><p class="edit-note">每一站的 Google 與 NAVER 按鈕都會讀取該筆最新資料；NAVER 優先使用韓文關鍵字或你貼入的 NAVER 網址。</p></div><div class="card"><h3>餐廳與甜點</h3><div class="food">${(d.foods||[]).map(f=>`<div class="food-item"><h4>${escapeHtml(f[0])}</h4><div class="meta">${escapeHtml(f[1])}<br><span class="highlight">${escapeHtml(f[2])}</span></div><div class="btns"><a class="btn alt" href="${maps(f[0])}" target="_blank">Google</a><a class="btn alt" href="${naver(f[0])}" target="_blank">NAVER</a></div></div>`).join('')}</div><div class="warn">餐廳營業時間、休息日與最後點餐時間可能更動，請在前一晚以 NAVER Map 為準。</div></div><div class="card"><h3>當日預算</h3><div class="budget">${(d.budget||[]).map(b=>`<div>${escapeHtml(b)}</div>`).join('')}</div></div>`;container.appendChild(section)});document.querySelectorAll('.day-edit').forEach(btn=>btn.addEventListener('click',()=>openEditor(Number(btn.dataset.index))))}

function updateDayField(field,value){days[currentDay][field]=value;saveLocal();queueCloudSave();render()}
function persistAndRefreshEditors(){saveLocal();queueCloudSave();render();renderFoodEditor();renderBudgetEditor()}
function renderFoodEditor(){const box=document.getElementById('foodEditor');if(!box)return;const foods=days[currentDay].foods||(days[currentDay].foods=[]);box.innerHTML=foods.length?foods.map((f,i)=>`<div class="inline-row"><label class="field"><span>名稱</span><input data-food="${i}" data-part="0" value="${escapeHtml(f[0]||'')}"></label><label class="field"><span>說明</span><input data-food="${i}" data-part="1" value="${escapeHtml(f[1]||'')}"></label><label class="field"><span>價格／預算</span><input data-food="${i}" data-part="2" value="${escapeHtml(f[2]||'')}"></label><div class="row-actions"><button class="delete" data-delete-food="${i}">刪除</button></div></div>`).join(''):'<div class="empty">尚未新增餐廳或甜點。</div>';box.querySelectorAll('[data-food]').forEach(inp=>inp.addEventListener('input',e=>{foods[Number(e.target.dataset.food)][Number(e.target.dataset.part)]=e.target.value;saveLocal();queueCloudSave();render()}));box.querySelectorAll('[data-delete-food]').forEach(btn=>btn.addEventListener('click',()=>{foods.splice(Number(btn.dataset.deleteFood),1);persistAndRefreshEditors()}))}
function renderBudgetEditor(){const box=document.getElementById('budgetEditor');if(!box)return;const budget=days[currentDay].budget||(days[currentDay].budget=[]);box.innerHTML=budget.length?budget.map((b,i)=>`<div class="inline-row"><label class="field"><span>預算內容</span><input data-budget="${i}" value="${escapeHtml(b||'')}"></label><div class="row-actions"><button class="delete" data-delete-budget="${i}">刪除</button></div></div>`).join(''):'<div class="empty">尚未新增預算。</div>';box.querySelectorAll('[data-budget]').forEach(inp=>inp.addEventListener('input',e=>{budget[Number(e.target.dataset.budget)]=e.target.value;saveLocal();queueCloudSave();render()}));box.querySelectorAll('[data-delete-budget]').forEach(btn=>btn.addEventListener('click',()=>{budget.splice(Number(btn.dataset.deleteBudget),1);persistAndRefreshEditors()}))}
function updateEvent(idx,field,value){days[currentDay].events[idx]=normalizeEvent(days[currentDay].events[idx]);days[currentDay].events[idx][field]=value;saveLocal();queueCloudSave();render()}
function handleItemAction(idx,action){const arr=days[currentDay].events;if(action==='delete'){if(confirm('確定刪除這個地點嗎？'))arr.splice(idx,1)}else if(action==='up'&&idx>0){[arr[idx-1],arr[idx]]=[arr[idx],arr[idx-1]]}else if(action==='down'&&idx<arr.length-1){[arr[idx+1],arr[idx]]=[arr[idx],arr[idx+1]]}saveLocal();queueCloudSave();render();renderEditor()}
function addPlace(){days[currentDay].events.push(normalizeEvent({time:'12:00',name:'新地點'}));saveLocal();queueCloudSave();render();renderEditor();setTimeout(()=>{const inputs=document.querySelectorAll('#editorList [data-field="name"]');inputs[inputs.length-1]?.focus()},50)}
function dayKeyFromIndex(i){return days[i].date.split('（')[0]}
function toTwd(exp){const amount=Number(exp.amount)||0;if(exp.currency==='TWD')return amount;const rate=Number(exchangeRates[exp.day])||1;return amount/rate}
function formatMoney(v,c='TWD'){return c==='KRW'?'₩'+Math.round(v).toLocaleString():'NT$'+Math.round(v).toLocaleString()}
function renderExpenseModal(){const daySel=document.getElementById('expenseDay');daySel.innerHTML=days.map((d,i)=>`<option value="${dayKeyFromIndex(i)}">${escapeHtml(d.date)}</option>`).join('');const payer=document.getElementById('expensePayer');payer.innerHTML=MEMBERS.map(m=>`<option value="${m}">${m}</option>`).join('');document.getElementById('splitMembers').innerHTML=MEMBERS.map(m=>`<label class="check-pill"><input type="checkbox" value="${m}" checked>${m}</label>`).join('');document.getElementById('rateEditor').innerHTML=days.map((d,i)=>{const k=dayKeyFromIndex(i);return `<label class="field"><span>${k}：1 TWD = ? KRW</span><input type="number" min="1" step="0.01" value="${exchangeRates[k]||43.2}" data-rate="${k}"></label>`}).join('');document.querySelectorAll('[data-rate]').forEach(inp=>inp.addEventListener('change',e=>{exchangeRates[e.target.dataset.rate]=Number(e.target.value)||43.2;saveLocal();queueCloudSave();renderExpenseSummary()}));renderExpenseSummary()}
function resetExpenseForm(){document.getElementById('expenseEditId').value='';document.getElementById('expenseFormTitle').textContent='新增付款';document.getElementById('expenseTitle').value='';document.getElementById('expenseAmount').value='';document.getElementById('expenseCurrency').value='KRW';document.getElementById('expensePayer').value=MEMBERS[0];document.querySelectorAll('#splitMembers input').forEach(x=>x.checked=true);document.getElementById('addExpense').textContent='＋ 儲存支出';document.getElementById('expenseFormActions').classList.remove('editing')}
function addExpense(){const editId=document.getElementById('expenseEditId').value;const title=document.getElementById('expenseTitle').value.trim();const day=document.getElementById('expenseDay').value;const payer=document.getElementById('expensePayer').value;const currency=document.getElementById('expenseCurrency').value;const amount=Number(document.getElementById('expenseAmount').value);const splitWith=[...document.querySelectorAll('#splitMembers input:checked')].map(x=>x.value);if(!title||!amount||amount<=0||!splitWith.length){alert('請填寫項目、金額，並至少勾選一位分攤者。');return}const row={id:editId||crypto.randomUUID(),title,day,payer,currency,amount,splitWith,createdAt:editId?(expenses.find(e=>e.id===editId)?.createdAt||new Date().toISOString()):new Date().toISOString()};if(editId){const idx=expenses.findIndex(e=>e.id===editId);if(idx>=0)expenses[idx]=row}else expenses.push(row);resetExpenseForm();saveLocal();queueCloudSave();renderExpenseSummary()}
function editExpense(id){const e=expenses.find(x=>x.id===id);if(!e)return;document.getElementById('expenseEditId').value=e.id;document.getElementById('expenseFormTitle').textContent='編輯付款';document.getElementById('expenseTitle').value=e.title;document.getElementById('expenseDay').value=e.day;document.getElementById('expensePayer').value=e.payer;document.getElementById('expenseCurrency').value=e.currency;document.getElementById('expenseAmount').value=e.amount;document.querySelectorAll('#splitMembers input').forEach(x=>x.checked=e.splitWith.includes(x.value));document.getElementById('addExpense').textContent='儲存修改';document.getElementById('expenseFormActions').classList.add('editing');document.getElementById('expenseTitle').focus()}
function deleteExpense(id){if(!confirm('確定刪除這筆付款嗎？'))return;expenses=expenses.filter(e=>e.id!==id);if(document.getElementById('expenseEditId').value===id)resetExpenseForm();saveLocal();queueCloudSave();renderExpenseSummary()}
function renderExpenseSummary(){const paid=Object.fromEntries(MEMBERS.map(m=>[m,0]));const owes=Object.fromEntries(MEMBERS.map(m=>[m,0]));let total=0,totalKrw=0;expenses.forEach(e=>{const twd=toTwd(e);total+=twd;totalKrw+=e.currency==='KRW'?Number(e.amount):Number(e.amount)*(Number(exchangeRates[e.day])||1);paid[e.payer]=(paid[e.payer]||0)+twd;const each=twd/e.splitWith.length;e.splitWith.forEach(m=>owes[m]=(owes[m]||0)+each)});const net=Object.fromEntries(MEMBERS.map(m=>[m,(paid[m]||0)-(owes[m]||0)]));let debtors=MEMBERS.filter(m=>net[m]<-0.5).map(m=>[m,-net[m]]),creditors=MEMBERS.filter(m=>net[m]>0.5).map(m=>[m,net[m]]),settles=[];let i=0,j=0;while(i<debtors.length&&j<creditors.length){const amt=Math.min(debtors[i][1],creditors[j][1]);settles.push([debtors[i][0],creditors[j][0],amt]);debtors[i][1]-=amt;creditors[j][1]-=amt;if(debtors[i][1]<0.5)i++;if(creditors[j][1]<0.5)j++}document.getElementById('expenseSummary').innerHTML=`<div class="expense-metrics"><div class="expense-metric"><small>總支出（韓元換算）</small><b>${formatMoney(totalKrw,'KRW')}</b></div><div class="expense-metric"><small>約台幣</small><b>${formatMoney(total)}</b></div><div class="expense-metric"><small>付款筆數</small><b>${expenses.length} 筆</b></div><div class="expense-metric"><small>三人平均</small><b>${formatMoney(total/3)}</b></div></div><div style="margin-top:10px">${MEMBERS.map(m=>`<div class="person-balance"><div class="person-avatar">${m}</div><div><b>已付 ${formatMoney(paid[m])}</b><div class="mini">應負擔 ${formatMoney(owes[m])}</div></div><div class="${net[m]>=0?'positive':'negative'}">${net[m]>=0?'應收':'應補'}<br>${formatMoney(Math.abs(net[m]))}</div></div>`).join('')}</div><div class="settlement"><b>建議轉帳</b><br>${settles.length?settles.map(x=>`${escapeHtml(x[0])} 轉給 ${escapeHtml(x[1])}：${formatMoney(x[2])}`).join('<br>'):'目前帳目已平衡，無需轉帳。'}</div>`;document.getElementById('expenseList').innerHTML=expenses.length?expenses.slice().reverse().map(e=>{const twd=toTwd(e);return `<div class="expense-row"><div class="expense-top"><strong>${escapeHtml(e.title)}</strong><span>${formatMoney(e.amount,e.currency)}</span></div><div class="expense-meta">${escapeHtml(e.day)}｜${escapeHtml(e.payer)}付款<br>分攤：${e.splitWith.map(escapeHtml).join('、')}｜約 ${formatMoney(twd)}<br>當日匯率：1 TWD = ${exchangeRates[e.day]||43.2} KRW</div><div class="expense-actions"><button onclick="editExpense('${e.id}')">編輯</button><button class="delete" onclick="deleteExpense('${e.id}')">刪除</button></div></div>`}).join(''):'<div class="empty">目前還沒有付款紀錄。</div>'}
document.getElementById('editCurrent').addEventListener('click',()=>openEditor(currentDay));document.getElementById('manageExpenses').addEventListener('click',()=>{renderExpenseModal();openModal('expenseModal')});document.getElementById('addPlace').addEventListener('click',addPlace);document.getElementById('addExpense').addEventListener('click',addExpense);document.getElementById('cancelExpenseEdit').addEventListener('click',resetExpenseForm);document.querySelectorAll('[data-close]').forEach(btn=>btn.addEventListener('click',()=>closeModal(btn.dataset.close)));document.querySelectorAll('.modal').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)closeModal(m.id)}));document.querySelectorAll('.sticky-nav button').forEach(btn=>btn.addEventListener('click',()=>goDay(Number(btn.dataset.day))));
normalizeDays();render();loadCloud();subscribeRealtime();
</script>
</body>
