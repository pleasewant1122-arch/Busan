<style>

*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;background:#eef3f7;color:var(--ink);line-height:1.55}button,input,textarea,select{font:inherit}button{cursor:pointer}a{color:inherit;text-decoration:none}.app{max-width:520px;margin:auto;background:#f8fbfd;min-height:100vh;box-shadow:0 0 30px #0001}.hero{padding:22px 18px 16px;background:linear-gradient(135deg,#173153,#3d6e98);color:#fff;position:relative;overflow:hidden}.hero:after{content:"";position:absolute;width:190px;height:190px;border:1px solid #ffffff35;border-radius:50%;right:-60px;top:-80px}.eyebrow{font-size:13px;letter-spacing:.12em;opacity:.78}.hero h1{font-size:30px;margin:4px 0 6px}.hero p{margin:0;opacity:.9}.flight{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}.flight>div{background:#ffffff16;border:1px solid #ffffff30;border-radius:14px;padding:12px}.flight b{display:block;font-size:17px}.flight small{opacity:.82}.hero-actions{display:flex;gap:8px;margin-top:14px;position:relative;z-index:2}.hero-actions button{border:1px solid #ffffff55;background:#ffffff18;color:#fff;border-radius:12px;padding:9px 12px;font-weight:800}.hero-actions .primary{background:#fff;color:var(--navy)}.tabs{display:flex;gap:8px;overflow:auto;padding:12px 14px;position:sticky;top:0;background:#f8fbfdee;backdrop-filter:blur(10px);z-index:20;border-bottom:1px solid var(--line)}.tab{min-width:74px;text-align:center;padding:9px 10px;border-radius:999px;background:#fff;border:1px solid var(--line);font-weight:700;font-size:13px}.tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}.section{padding:14px}.day{display:none}.day.active{display:block}.title-card{border-radius:20px;padding:18px;background:linear-gradient(135deg,#fff,#edf6fb);border:1px solid var(--line);margin-bottom:14px}.title-card .dayno{font-size:13px;font-weight:800;color:var(--coral);letter-spacing:.1em}.title-card h2{font-size:25px;margin:3px 0 4px;color:var(--navy)}.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}.chip{font-size:12px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:5px 9px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:15px;margin-bottom:12px;box-shadow:0 8px 20px #1831530a}.card h3{font-size:17px;margin:0 0 10px;color:var(--navy)}.timeline{position:relative;margin-left:8px}.timeline:before{content:"";position:absolute;left:6px;top:8px;bottom:8px;width:2px;background:#c9d9e6}.event{position:relative;padding-left:30px;margin:0 0 18px}.event:last-child{margin-bottom:0}.event:before{content:"";position:absolute;left:0;top:6px;width:12px;height:12px;background:#fff;border:3px solid var(--blue);border-radius:50%}.time{font-weight:800;color:var(--coral);font-size:14px}.event b{display:block;font-size:16px}.event p{margin:3px 0;color:var(--muted);font-size:13px}.route{background:linear-gradient(180deg,#eaf5fb,#fff);border-radius:16px;padding:14px}.route-line{display:flex;align-items:center;gap:8px;overflow:auto;padding-bottom:4px}.stop{min-width:max-content;background:#fff;border:1px solid #cbdde9;border-radius:999px;padding:8px 10px;font-size:12px;font-weight:700}.arrow{color:#7a9bb6}.mapbox{border-radius:16px;background:#e8f1f6;padding:15px;position:relative;min-height:225px;overflow:hidden}.mapgrid{position:absolute;inset:0;background-image:linear-gradient(#ffffff66 1px,transparent 1px),linear-gradient(90deg,#ffffff66 1px,transparent 1px);background-size:28px 28px;opacity:.6}.coast{position:absolute;right:-55px;top:-20px;width:210px;height:310px;border-radius:45% 0 0 55%;background:#bfe2f4}.dot{position:absolute;width:14px;height:14px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 2px currentColor}.label{position:absolute;background:#fff;border:1px solid #cbdde9;border-radius:10px;padding:5px 8px;font-size:11px;font-weight:800;box-shadow:0 4px 12px #0001}.btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.btn{display:block;text-align:center;padding:10px 8px;border-radius:12px;background:var(--navy);color:#fff;font-weight:800;font-size:13px;border:0}.btn.alt{background:#edf4f8;color:var(--navy);border:1px solid #cadbe6}.btn.edit{background:var(--coral)}.food{display:grid;grid-template-columns:1fr;gap:10px}.food-item{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff}.food-item h4{margin:0 0 4px;font-size:15px}.meta{font-size:12px;color:var(--muted)}.warn{font-size:12px;color:#8a5a28;background:#fff6df;border:1px solid #f0d28c;padding:8px 10px;border-radius:10px;margin-top:8px}.budget{display:grid;grid-template-columns:1fr 1fr;gap:8px}.budget div{background:#f4f8fb;border-radius:12px;padding:10px}.budget b{display:block;color:var(--navy)}.hotel{display:grid;grid-template-columns:1fr 1fr;gap:10px}.hotel-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px}.hotel-card h4{margin:0 0 4px}.mini,.note{font-size:12px;color:var(--muted)}.footer{padding:22px 18px 90px;text-align:center;color:var(--muted);font-size:12px}.highlight{color:var(--coral);font-weight:800}.sticky-nav{position:fixed;left:50%;transform:translateX(-50%);bottom:10px;width:min(490px,calc(100% - 24px));background:#ffffffee;backdrop-filter:blur(12px);border:1px solid var(--line);box-shadow:0 8px 25px #0002;border-radius:18px;padding:8px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;z-index:30}.sticky-nav button{border:0;background:#f1f5f8;border-radius:12px;padding:9px 4px;font-size:11px;font-weight:800;color:var(--navy)}
.modal{position:fixed;inset:0;background:#0f1e2dcc;z-index:100;display:none;align-items:flex-end;justify-content:center}.modal.open{display:flex}.sheet{width:min(520px,100%);max-height:92vh;overflow:auto;background:#f8fbfd;border-radius:24px 24px 0 0;padding:16px 14px 28px}.sheet-head{display:flex;justify-content:space-between;align-items:center;gap:10px;position:sticky;top:-16px;background:#f8fbfdee;backdrop-filter:blur(10px);z-index:3;padding:10px 0}.sheet-head h2{font-size:20px;margin:0;color:var(--navy)}.icon-btn{border:1px solid var(--line);background:#fff;border-radius:12px;padding:8px 11px;font-weight:800;color:var(--navy)}.editor-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:10px}.field{display:block;margin-bottom:9px}.field span{display:block;font-size:12px;font-weight:800;color:var(--muted);margin-bottom:4px}.field input,.field textarea,.field select{width:100%;border:1px solid #cad8e2;border-radius:10px;padding:9px 10px;background:#fff;color:var(--ink)}.field textarea{min-height:64px;resize:vertical}.two{display:grid;grid-template-columns:110px 1fr;gap:8px}.item-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:8px}.item-actions button{border:1px solid var(--line);background:#f4f8fb;color:var(--navy);border-radius:10px;padding:8px;font-weight:800}.item-actions .delete{color:var(--danger);background:#fff4f4;border-color:#f0caca}.editor-footer{display:grid;grid-template-columns:1fr 1fr;gap:8px;position:sticky;bottom:-28px;background:#f8fbfdee;backdrop-filter:blur(10px);padding:10px 0 4px}.editor-footer button{border:0;border-radius:12px;padding:11px;font-weight:800}.editor-footer .add{background:var(--green);color:#fff}.editor-footer .done{background:var(--navy);color:#fff}.manage-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.manage-grid button,.upload-label{display:block;text-align:center;border:1px solid var(--line);background:#fff;color:var(--navy);border-radius:12px;padding:10px;font-weight:800}.upload-label input{display:none}.save-tip{font-size:12px;color:var(--green);font-weight:800;margin:6px 0 12px}.empty{color:var(--muted);font-size:13px;padding:8px 0}.edit-note{font-size:12px;color:var(--muted);margin-top:8px}
@media print{.tabs,.sticky-nav,.hero-actions,.edit-controls{display:none!important}.day{display:block!important;page-break-after:always}.app{max-width:none;box-shadow:none}}
</style>

<body>
<div class="app">
<header class="hero"><div class="eyebrow">BUSAN MOBILE TRAVEL MOOK</div><h1>釜山 5天4夜</h1><p>3位大人｜可自行調整每日地點</p><div class="flight"><div><small>去程 8/6</small><b>KE2086</b><small>12:00 桃園 → 15:30 金海</small></div><div><small>回程 8/10</small><b>KE2085</b><small>09:00 金海 → 桃園</small></div></div><div class="hero-actions"><button class="primary" id="editCurrent">編輯今天行程</button><button id="manageData">備份／還原</button></div></header>
<nav class="tabs" id="tabs"></nav>
<main class="section" id="days"></main>
<div class="footer">你修改的行程會自動儲存在這台手機／瀏覽器中。若要和朋友共用同一版本，請使用「匯出 JSON」後傳給朋友匯入。<br>營業時間仍建議在前一晚以 NAVER Map 再確認。</div>
</div>
<div class="sticky-nav"><button data-day="0">8/6</button><button data-day="1">8/7</button><button data-day="2">8/8</button><button data-day="3">8/9</button></div>

  <div class="sheet">
    <div class="sheet-head"><h2 id="editorTitle">編輯行程</h2><button class="icon-btn" data-close="editorModal">關閉</button></div>
    <div class="save-tip" id="saveTip">修改後會自動儲存</div>
    <div id="editorList"></div>
    <div class="editor-footer"><button class="add" id="addPlace">＋ 新增地點</button><button class="done" data-close="editorModal">完成</button></div>
  </div>
</div>

<div class="modal" id="manageModal" aria-hidden="true">
  <div class="sheet">
    <div class="sheet-head"><h2>備份與還原</h2><button class="icon-btn" data-close="manageModal">關閉</button></div>
    <div class="card"><h3>跨裝置分享</h3><p class="note">瀏覽器儲存只會留在目前裝置。要把同一份行程傳給朋友，請匯出 JSON；朋友開啟網站後再匯入。</p><div class="manage-grid"><button id="exportData">匯出 JSON</button><label class="upload-label">匯入 JSON<input type="file" id="importData" accept="application/json"></label><button id="resetData">恢復原始行程</button><button id="printGuide">列印／存 PDF</button></div></div>
  </div>
</div>

<script>
const STORAGE_KEY='busan-guide-editable-v1';
const DEFAULT_DAYS=[
{date:'8/6（四）',title:'抵達釜山・廣安里夜景',chips:['入住海雲台','廣安大橋','輕鬆行程'],events:[['15:30','抵達金海國際機場','入境、領行李、購買或儲值 T-money。'],['16:40','前往海雲台住宿','省錢：金海輕軌→沙上→地鐵2號線；3人行李多可直接計程車。'],['18:30','ThePlace34 入住','8/6–8/8，共2晚；地址：1381-5 Jung-dong, Haeundae-gu。'],['19:30','廣安里晚餐','廣安木韓牛／Working Holiday Busan 二選一。'],['21:00','廣安里海灘散步','看廣安大橋夜景。'],['22:30','甜點或炸雞回飯店','Puradak、BRONI、便利商店補給。']],foods:[['廣安木韓牛','韓牛烤肉；建議事先排隊或預約','約 ₩40,000–60,000／人'],['Working Holiday Busan','海景餐酒館，適合第一晚','約 ₩25,000–45,000／人'],['Puradak 炸雞','可外帶回飯店','約 ₩20,000–25,000／份']],budget:['交通 ₩3,000–20,000','晚餐 ₩25,000–60,000','宵夜 ₩10,000–20,000','每人約 ₩38,000–100,000']},
{date:'8/7（五）',title:'海雲台藍線公園一日',chips:['24H Pass','尾浦→青沙浦','汗蒸幕'],events:[['08:00','嚴湧帛豬肉湯飯','早餐時段較順；吃完前往尾浦站。'],['09:30','海雲台海灘散步','沿海走向尾浦站，順拍 X the SKY 外觀。'],['10:00','天空膠囊／海岸列車','去程尾浦→青沙浦建議天空膠囊；回程搭海岸列車。'],['11:00','青沙浦散步','燈塔、平交道、海景咖啡。'],['13:00','Mipo-jib 尾浦家午餐','醬蟹、生醃海鮮、釜飯。'],['15:00','Busan X the SKY','觀景台。'],['16:45','Club D Oasis','汗蒸幕與海景 Spa；建議預留2.5–3小時。'],['20:30','海雲台晚餐／海灘','依體力吃炸雞、湯飯或市場小吃。']],foods:[['嚴湧帛豬肉湯飯','早餐首選','約 ₩13,000／人'],['Mipo-jib 尾浦家','海鮮醬蟹套餐','約 ₩35,000–45,000／人'],['Jayeondo 鹽麵包','青沙浦或海雲台順路吃','售完為止']],budget:['24H Pass ₩55,000','天空膠囊約 ₩15,000–25,000','餐飲 ₩60,000–90,000','每人約 ₩135,000–175,000']},
{date:'8/8（六）',title:'南浦洞・市場海鮮日',chips:['換住宿','新東亞市場','札嘎其'],events:[['09:30','退房與移動','ThePlace34 退房後寄放行李，前往南浦洞。'],['11:30','新住宿 Aria 寄放行李','8/8 16:00 後入住。'],['12:00','新東亞水產市場午餐','85／87攤擇一；先問秤重價、料理費與座位費。'],['14:00','札嘎其市場','100／101攤逛市場，不必再吃第二餐。'],['15:30','BIFF廣場・光復路','逛街、Busan Bada Sand、OSULLOC。'],['18:30','昇昇畜產 南浦店','韓式烤肉晚餐。'],['21:00','富平石鍋燒／富平罐頭市場','想吃內臟燒烤可當宵夜。']],foods:[['新東亞水產市場','85／87攤，海鮮價格浮動','3人約 ₩120,000–200,000'],['札嘎其市場','100／101攤，以逛市場為主','料理費需另問'],['昇昇畜產 南浦店','韓式烤肉晚餐','約 ₩30,000–50,000／人']],budget:['交通 ₩5,000–10,000','海鮮 ₩40,000–100,000','晚餐宵夜 ₩40,000–70,000','每人約 ₩85,000–180,000']},
{date:'8/9（日）',title:'Centum City・田浦・西面',chips:['百貨','咖啡街','韓牌購物'],events:[['08:00','大海鮑魚粥','若距離住宿不順就改附近早餐。'],['10:30','新世界百貨 Centum City','地下街、OSULLOC、Olive Young、伴手禮。'],['13:15','搭地鐵2號線往田浦','Centum City→田浦／西面。'],['14:00','田浦咖啡街','咖啡、All Sunday Bagel。'],['15:30','西面購物','Musinsa、Emis、Marithé、Mardi、Matin Kim、Wannabe Clothes、DAISO。'],['19:00','水邊最高豬肉湯飯','若不順路就改西面晚餐。'],['21:00','回 Aria 整理行李','回程航班很早，今晚不要排太晚。']],foods:[['大海鮑魚粥','可當早餐','約 ₩15,000–25,000／人'],['All Sunday Bagel','熱門品項可能售完','約 ₩5,000–8,000／個'],['水邊最高豬肉湯飯','實際分店時間再查','約 ₩12,000–18,000／人']],budget:['交通 ₩5,000–10,000','餐飲 ₩45,000–75,000','咖啡甜點 ₩10,000–20,000','購物另計']},
{date:'8/10（一）',title:'金海機場・回台灣',chips:['超早出發','建議計程車','09:00起飛'],events:[['05:15','Aria 退房','前一晚整理好行李、叫好車。'],['05:20','搭計程車／預約接送','南浦洞到金海機場約30–45分鐘。'],['06:10','抵達金海機場','托運、安檢、退稅、早餐。'],['09:00','KE2085 起飛','建議至少起飛前2.5小時抵達。']],foods:[['機場早餐','依當日營業店家選擇','約 ₩8,000–15,000／人']],budget:['3人計程車約 ₩30,000–45,000','早餐 ₩8,000–15,000／人','每人約 ₩18,000–30,000']}
];
let days=loadData();
let currentDay=0;
function cloneDefaults(){return JSON.parse(JSON.stringify(DEFAULT_DAYS))}
function loadData(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return cloneDefaults();const parsed=JSON.parse(raw);return Array.isArray(parsed)&&parsed.length===5?parsed:cloneDefaults()}catch(e){return cloneDefaults()}}
function saveData(){localStorage.setItem(STORAGE_KEY,JSON.stringify(days));const tip=document.getElementById('saveTip');tip.textContent='已自動儲存 ✓';setTimeout(()=>tip.textContent='修改後會自動儲存',1200)}
function maps(q){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(q+' Busan')}
function naver(q){return 'https://map.naver.com/p/search/'+encodeURIComponent(q)}
function routeNames(d){return d.events.map(e=>e[1]).filter(Boolean)}
function makeMap(names){const pts=names.slice(0,7);let s='<div class="mapbox"><div class="mapgrid"></div><div class="coast"></div>';pts.forEach((name,i)=>{const x=12+(i%4)*21;const y=18+Math.floor(i/4)*42+(i%2)*12;s+=`<span class="dot" style="left:${x}%;top:${y}%;color:${i===pts.length-1?'#e47c6b':'#4478a8'}"></span><span class="label" style="left:${Math.min(x+2,76)}%;top:${Math.max(y-3,3)}%">${escapeHtml(name)}</span>`});return s+'</div>'}
function escapeHtml(v){return String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function render(){const tabs=document.getElementById('tabs'),container=document.getElementById('days');tabs.innerHTML='';container.innerHTML='';days.forEach((d,i)=>{const tab=document.createElement('button');tab.className='tab '+(i===currentDay?'active':'');tab.innerHTML=`${escapeHtml(d.date.split('（')[0])}<br>${i+1}日`;tab.addEventListener('click',()=>goDay(i));tabs.appendChild(tab);const names=routeNames(d);const section=document.createElement('section');section.className='day '+(i===currentDay?'active':'');section.innerHTML=`<div class="title-card"><div class="dayno">DAY ${i+1}・${escapeHtml(d.date)}</div><h2>${escapeHtml(d.title)}</h2><div class="chips">${d.chips.map(c=>`<span class="chip">${escapeHtml(c)}</span>`).join('')}</div></div><div class="card"><h3>今日時間軸</h3><div class="timeline">${d.events.length?d.events.map(e=>`<div class="event"><span class="time">${escapeHtml(e[0])}</span><b>${escapeHtml(e[1])}</b><p>${escapeHtml(e[2])}</p></div>`).join(''):'<div class="empty">今天還沒有行程，點「編輯這天」新增地點。</div>'}</div><div class="btns edit-controls"><button class="btn edit day-edit" data-index="${i}">編輯這天</button><a class="btn alt" href="${maps(names.join(' '))}" target="_blank">Google 地圖</a></div></div><div class="card"><h3>今日路線</h3>${makeMap(names)}<div class="route"><div class="route-line">${names.length?names.map((r,j)=>`${j?'<span class="arrow">→</span>':''}<span class="stop">${escapeHtml(r)}</span>`).join(''):'<span class="empty">尚無地點</span>'}</div></div><div class="btns"><a class="btn" href="${maps(names.join(' '))}" target="_blank">搜尋整日地點</a><a class="btn alt" href="${naver(names[names.length-1]||'Busan')}" target="_blank">NAVER 搜尋終點</a></div><p class="edit-note">提示：這是行程順序示意；實際導航請逐站開啟 Google Maps 或 NAVER Map。</p></div><div class="card"><h3>餐廳與甜點</h3><div class="food">${d.foods.map(f=>`<div class="food-item"><h4>${escapeHtml(f[0])}</h4><div class="meta">${escapeHtml(f[1])}<br><span class="highlight">${escapeHtml(f[2])}</span></div><div class="btns"><a class="btn alt" href="${maps(f[0])}" target="_blank">Google</a><a class="btn alt" href="${naver(f[0])}" target="_blank">NAVER</a></div></div>`).join('')}</div><div class="warn">餐廳營業時間、休息日與最後點餐時間可能更動，請在前一晚以 NAVER Map 為準。</div></div><div class="card"><h3>當日預算</h3><div class="budget">${d.budget.map(b=>`<div>${escapeHtml(b)}</div>`).join('')}</div></div>`;container.appendChild(section)});document.querySelectorAll('.day-edit').forEach(btn=>btn.addEventListener('click',()=>openEditor(Number(btn.dataset.index))))}
function goDay(i){currentDay=Math.max(0,Math.min(i,days.length-1));render();window.scrollTo({top:150,behavior:'smooth'})}
function openModal(id){const m=document.getElementById(id);m.classList.add('open');m.setAttribute('aria-hidden','false')}
function closeModal(id){const m=document.getElementById(id);m.classList.remove('open');m.setAttribute('aria-hidden','true')}
function openEditor(i){currentDay=i;renderEditor();openModal('editorModal')}
function renderEditor(){const d=days[currentDay];document.getElementById('editorTitle').textContent=`編輯 ${d.date} 行程`;const list=document.getElementById('editorList');list.innerHTML='';d.events.forEach((e,idx)=>{const card=document.createElement('div');card.className='editor-card';card.innerHTML=`<div class="two"><label class="field"><span>時間</span><input type="time" value="${escapeHtml(e[0])}" data-field="time"></label><label class="field"><span>地點／行程名稱</span><input type="text" value="${escapeHtml(e[1])}" data-field="name" placeholder="例如：海雲台海灘"></label></div><label class="field"><span>備註</span><textarea data-field="note" placeholder="交通、餐廳、提醒事項">${escapeHtml(e[2])}</textarea></label><div class="item-actions"><button data-action="up">上移</button><button data-action="down">下移</button><button class="delete" data-action="delete">刪除</button></div>`;card.querySelector('[data-field="time"]').addEventListener('input',ev=>updateEvent(idx,0,ev.target.value));card.querySelector('[data-field="name"]').addEventListener('input',ev=>updateEvent(idx,1,ev.target.value));card.querySelector('[data-field="note"]').addEventListener('input',ev=>updateEvent(idx,2,ev.target.value));card.querySelectorAll('[data-action]').forEach(btn=>btn.addEventListener('click',()=>handleItemAction(idx,btn.dataset.action)));list.appendChild(card)});if(!d.events.length)list.innerHTML='<div class="empty">目前沒有地點，請按下方「新增地點」。</div>'}
function updateEvent(idx,field,value){days[currentDay].events[idx][field]=value;saveData();render()}
function handleItemAction(idx,action){const arr=days[currentDay].events;if(action==='delete'){if(confirm('確定刪除這個地點嗎？'))arr.splice(idx,1)}else if(action==='up'&&idx>0){[arr[idx-1],arr[idx]]=[arr[idx],arr[idx-1]]}else if(action==='down'&&idx<arr.length-1){[arr[idx+1],arr[idx]]=[arr[idx],arr[idx+1]]}saveData();render();renderEditor()}
function addPlace(){days[currentDay].events.push(['12:00','新地點','']);saveData();render();renderEditor();setTimeout(()=>{const inputs=document.querySelectorAll('#editorList [data-field="name"]');inputs[inputs.length-1]?.focus()},50)}
function exportData(){const blob=new Blob([JSON.stringify(days,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='busan-trip-plan.json';a.click();URL.revokeObjectURL(a.href)}
function importData(file){if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const parsed=JSON.parse(reader.result);if(!Array.isArray(parsed)||parsed.length!==5)throw new Error();days=parsed;saveData();render();alert('行程已成功匯入。');closeModal('manageModal')}catch(e){alert('檔案格式不正確，請使用本網站匯出的 JSON。')}};reader.readAsText(file)}
function resetData(){if(confirm('確定恢復成最初的釜山行程嗎？目前修改會被清除。')){days=cloneDefaults();saveData();render();closeModal('manageModal')}}
document.getElementById('editCurrent').addEventListener('click',()=>openEditor(currentDay));document.getElementById('manageData').addEventListener('click',()=>openModal('manageModal'));document.getElementById('addPlace').addEventListener('click',addPlace);document.getElementById('exportData').addEventListener('click',exportData);document.getElementById('importData').addEventListener('change',e=>importData(e.target.files[0]));document.getElementById('resetData').addEventListener('click',resetData);document.getElementById('printGuide').addEventListener('click',()=>window.print());document.querySelectorAll('[data-close]').forEach(btn=>btn.addEventListener('click',()=>closeModal(btn.dataset.close)));document.querySelectorAll('.modal').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)closeModal(m.id)}));document.querySelectorAll('.sticky-nav button').forEach(btn=>btn.addEventListener('click',()=>goDay(Number(btn.dataset.day))));
render();
</script>
</body>
</html>
