<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>釜山 5天4夜｜手機旅遊攻略</title>
<style>
:root{--navy:#183153;--blue:#4478a8;--sky:#eaf5fb;--cream:#fff8ef;--coral:#e47c6b;--green:#5a9b7d;--gold:#c79c56;--ink:#20252b;--muted:#6c747d;--card:#ffffff;--line:#dfe7ee}
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;background:#eef3f7;color:var(--ink);line-height:1.55}
a{color:inherit;text-decoration:none}.app{max-width:520px;margin:auto;background:#f8fbfd;min-height:100vh;box-shadow:0 0 30px #0001}.hero{padding:22px 18px 16px;background:linear-gradient(135deg,#173153,#3d6e98);color:#fff;position:relative;overflow:hidden}.hero:after{content:"";position:absolute;width:190px;height:190px;border:1px solid #ffffff35;border-radius:50%;right:-60px;top:-80px}.eyebrow{font-size:13px;letter-spacing:.12em;opacity:.78}.hero h1{font-size:30px;margin:4px 0 6px}.hero p{margin:0;opacity:.9}.flight{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}.flight>div{background:#ffffff16;border:1px solid #ffffff30;border-radius:14px;padding:12px}.flight b{display:block;font-size:17px}.flight small{opacity:.82}.tabs{display:flex;gap:8px;overflow:auto;padding:12px 14px;position:sticky;top:0;background:#f8fbfdee;backdrop-filter:blur(10px);z-index:20;border-bottom:1px solid var(--line)}.tab{min-width:74px;text-align:center;padding:9px 10px;border-radius:999px;background:#fff;border:1px solid var(--line);font-weight:700;font-size:13px}.tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}.section{padding:14px}.day{display:none}.day.active{display:block}.title-card{border-radius:20px;padding:18px;background:linear-gradient(135deg,#fff,#edf6fb);border:1px solid var(--line);margin-bottom:14px}.title-card .dayno{font-size:13px;font-weight:800;color:var(--coral);letter-spacing:.1em}.title-card h2{font-size:25px;margin:3px 0 4px;color:var(--navy)}.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}.chip{font-size:12px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:5px 9px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:15px;margin-bottom:12px;box-shadow:0 8px 20px #1831530a}.card h3{font-size:17px;margin:0 0 10px;color:var(--navy)}.timeline{position:relative;margin-left:8px}.timeline:before{content:"";position:absolute;left:6px;top:8px;bottom:8px;width:2px;background:#c9d9e6}.event{position:relative;padding-left:30px;margin:0 0 18px}.event:last-child{margin-bottom:0}.event:before{content:"";position:absolute;left:0;top:6px;width:12px;height:12px;background:#fff;border:3px solid var(--blue);border-radius:50%}.time{font-weight:800;color:var(--coral);font-size:14px}.event b{display:block;font-size:16px}.event p{margin:3px 0;color:var(--muted);font-size:13px}.route{background:linear-gradient(180deg,#eaf5fb,#fff);border-radius:16px;padding:14px}.route-line{display:flex;align-items:center;gap:8px;overflow:auto;padding-bottom:4px}.stop{min-width:max-content;background:#fff;border:1px solid #cbdde9;border-radius:999px;padding:8px 10px;font-size:12px;font-weight:700}.arrow{color:#7a9bb6}.mapbox{border-radius:16px;background:#e8f1f6;padding:15px;position:relative;min-height:235px;overflow:hidden}.mapgrid{position:absolute;inset:0;background-image:linear-gradient(#ffffff66 1px,transparent 1px),linear-gradient(90deg,#ffffff66 1px,transparent 1px);background-size:28px 28px;opacity:.6}.coast{position:absolute;right:-55px;top:-20px;width:210px;height:310px;border-radius:45% 0 0 55%;background:#bfe2f4}.mline{position:absolute;height:6px;border-radius:999px;transform-origin:left center}.dot{position:absolute;width:14px;height:14px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 2px currentColor}.label{position:absolute;background:#fff;border:1px solid #cbdde9;border-radius:10px;padding:5px 8px;font-size:11px;font-weight:800;box-shadow:0 4px 12px #0001}.btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.btn{display:block;text-align:center;padding:10px 8px;border-radius:12px;background:var(--navy);color:#fff;font-weight:800;font-size:13px}.btn.alt{background:#edf4f8;color:var(--navy);border:1px solid #cadbe6}.food{display:grid;grid-template-columns:1fr;gap:10px}.food-item{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff}.food-item h4{margin:0 0 4px;font-size:15px}.meta{font-size:12px;color:var(--muted)}.warn{font-size:12px;color:#8a5a28;background:#fff6df;border:1px solid #f0d28c;padding:8px 10px;border-radius:10px;margin-top:8px}.budget{display:grid;grid-template-columns:1fr 1fr;gap:8px}.budget div{background:#f4f8fb;border-radius:12px;padding:10px}.budget b{display:block;color:var(--navy)}.hotel{display:grid;grid-template-columns:1fr 1fr;gap:10px}.hotel-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px}.hotel-card h4{margin:0 0 4px}.mini{font-size:12px;color:var(--muted)}.footer{padding:22px 18px 90px;text-align:center;color:var(--muted);font-size:12px}.note{font-size:12px;color:var(--muted)}.highlight{color:var(--coral);font-weight:800}.checklist{padding-left:20px;margin:0}.checklist li{margin:6px 0}.sticky-nav{position:fixed;left:50%;transform:translateX(-50%);bottom:10px;width:min(490px,calc(100% - 24px));background:#ffffffee;backdrop-filter:blur(12px);border:1px solid var(--line);box-shadow:0 8px 25px #0002;border-radius:18px;padding:8px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;z-index:30}.sticky-nav button{border:0;background:#f1f5f8;border-radius:12px;padding:9px 4px;font-size:11px;font-weight:800;color:var(--navy)}
@media print{.tabs,.sticky-nav{display:none}.day{display:block!important;page-break-after:always}.app{max-width:none;box-shadow:none}}
</style>
</head>
<body>
<div class="app">
<header class="hero"><div class="eyebrow">BUSAN MOBILE TRAVEL MOOK</div><h1>釜山 5天4夜</h1><p>3位大人｜海雲台・廣安里・南浦洞・西面</p><div class="flight"><div><small>去程 8/6</small><b>KE2086</b><small>12:00 桃園 → 15:30 金海</small></div><div><small>回程 8/10</small><b>KE2085</b><small>09:00 金海 → 桃園</small></div></div></header>
<nav class="tabs" id="tabs"></nav>
<main class="section" id="days"></main>
<div class="footer">營業時間與票價可能臨時調整，餐廳請於出發前 1 天用 NAVER Map 再確認。<br>本攻略依 2026/7 公開資料整理。</div>
</div>
<div class="sticky-nav"><button onclick="goDay(0)">總覽</button><button onclick="goDay(1)">通行證日</button><button onclick="goDay(2)">南浦洞</button><button onclick="goDay(3)">購物日</button></div>
<script>
const D=[
{date:'8/6（四）',title:'抵達釜山・廣安里夜景',chips:['入住海雲台','廣安大橋','輕鬆行程'],events:[['15:30','抵達金海國際機場','入境、領行李、購買或儲值 T-money。'],['16:40','前往海雲台住宿','省錢：金海輕軌→沙上→地鐵2號線；3人行李多可直接計程車。'],['18:30','ThePlace34 入住','8/6–8/8，共2晚；地址：1381-5 Jung-dong, Haeundae-gu。'],['19:30','廣安里晚餐','廣安木韓牛／Working Holiday Busan 二選一。'],['21:00','廣安里海灘散步','看廣安大橋夜景，週末可留意無人機燈光秀。'],['22:30','甜點或炸雞回飯店','Puradak、BRONI、便利商店補給。']],route:['金海機場','沙上站','西面站','海雲台住宿','廣安里'],foods:[['廣安木韓牛','韓牛烤肉；建議事先排隊或預約','約 ₩40,000–60,000／人'],['Working Holiday Busan','海景餐酒館，適合第一晚','約 ₩25,000–45,000／人'],['Puradak 炸雞','可外帶回飯店','約 ₩20,000–25,000／份']],budget:['交通 ₩3,000–20,000','晚餐 ₩25,000–60,000','宵夜 ₩10,000–20,000','每人約 ₩38,000–100,000'],map:'arrival'},
{date:'8/7（五）',title:'海雲台藍線公園一日',chips:['24H Pass','尾浦→青沙浦','汗蒸幕'],events:[['08:00','嚴湧帛豬肉湯飯','早餐時段較順；吃完前往尾浦站。'],['09:30','海雲台海灘散步','沿海走向尾浦站，順拍 X the SKY 外觀。'],['10:00','天空膠囊／海岸列車','去程尾浦→青沙浦建議天空膠囊；回程搭海岸列車。'],['11:00','青沙浦散步','燈塔、平交道、海景咖啡；勿排太久。'],['13:00','Mipo-jib 尾浦家午餐','醬蟹、生醃海鮮、釜飯；注意下午可能有休息時段。'],['15:00','Busan X the SKY','公開資訊為每日 10:00–21:00，最後入場約20:30。'],['16:45','Club D Oasis','汗蒸幕與海景 Spa；建議預留2.5–3小時。'],['20:30','海雲台晚餐／海灘','依體力吃炸雞、湯飯或市場小吃。']],route:['ThePlace34','尾浦站','青沙浦','Mipo-jib','X the SKY','Club D Oasis'],foods:[['嚴湧帛豬肉湯飯','早餐首選','約 ₩13,000／人'],['Mipo-jib 尾浦家','海鮮醬蟹套餐','約 ₩35,000–45,000／人'],['Jayeondo 鹽麵包','青沙浦或海雲台順路吃','售完為止']],budget:['24H Pass ₩55,000','天空膠囊約 ₩15,000–25,000','餐飲 ₩60,000–90,000','每人約 ₩135,000–175,000'],map:'haeundae'},
{date:'8/8（六）',title:'南浦洞・市場海鮮日',chips:['換住宿','新東亞市場','札嘎其'],events:[['09:30','退房與移動','ThePlace34 退房後寄放行李，前往南浦洞。'],['11:30','新住宿 Aria 寄放行李','8/8 16:00 後入住；地址：중앙대로180번길，釜山 48822。'],['12:00','新東亞水產市場午餐','85／87攤擇一；先問秤重價、料理費與座位費。'],['14:00','札嘎其市場','100／101攤逛市場，不必再吃第二餐。'],['15:30','BIFF廣場・光復路','逛街、Busan Bada Sand、OSULLOC。'],['18:30','昇昇畜產 南浦店','韓式烤肉晚餐。'],['21:00','富平石鍋燒／富平罐頭市場','想吃內臟燒烤可當宵夜，量別點太多。']],route:['海雲台住宿','Aria','新東亞市場','札嘎其','BIFF廣場','富平市場'],foods:[['新東亞水產市場','85／87攤，海鮮價格浮動','3人約 ₩120,000–200,000'],['札嘎其市場','100／101攤，以逛市場為主','料理費需另問'],['昇昇畜產 南浦店','韓式烤肉晚餐','約 ₩30,000–50,000／人']],budget:['交通 ₩5,000–10,000','海鮮 ₩40,000–100,000','晚餐宵夜 ₩40,000–70,000','每人約 ₩85,000–180,000'],map:'nampo'},
{date:'8/9（日）',title:'Centum City・田浦・西面',chips:['百貨','咖啡街','韓牌購物'],events:[['08:00','大海鮑魚粥','若距離住宿不順就改附近早餐，不必為早餐跨區。'],['10:30','新世界百貨 Centum City','地下街、OSULLOC、Olive Young、伴手禮。'],['13:15','搭地鐵2號線往田浦','Centum City→田浦／西面，免換線。'],['14:00','田浦咖啡街','咖啡、All Sunday Bagel；保留購物體力。'],['15:30','西面購物','Musinsa、Emis、Marithé、Mardi、Matin Kim、Wannabe Clothes、DAISO。'],['19:00','水邊最高豬肉湯飯','若分店不順路就改西面晚餐，避免為一餐繞太遠。'],['21:00','回 Aria 整理行李','回程航班很早，今晚不要排太晚。']],route:['Aria','Centum City','田浦咖啡街','西面商圈','Aria'],foods:[['大海鮑魚粥','07:00起可當早餐；實際分店時間再查','約 ₩15,000–25,000／人'],['All Sunday Bagel','熱門品項可能售完','約 ₩5,000–8,000／個'],['水邊最高豬肉湯飯','24小時店型常見，但仍看分店','約 ₩12,000–18,000／人']],budget:['交通 ₩5,000–10,000','餐飲 ₩45,000–75,000','咖啡甜點 ₩10,000–20,000','購物另計'],map:'shopping'},
{date:'8/10（一）',title:'金海機場・回台灣',chips:['超早出發','建議計程車','09:00起飛'],events:[['05:15','Aria 退房','前一晚整理好行李、叫好車。'],['05:20','搭計程車／預約接送','南浦洞到金海機場約30–45分鐘，清晨仍需預留。'],['06:10','抵達金海機場','托運、安檢、退稅、早餐。'],['09:00','KE2085 起飛','建議至少起飛前2.5小時抵達。']],route:['Aria','金海機場'],foods:[['機場早餐','安檢前後依營業店家選擇','約 ₩8,000–15,000／人']],budget:['3人計程車約 ₩30,000–45,000','早餐 ₩8,000–15,000／人','每人約 ₩18,000–30,000'],map:'airport'}];
function maps(q){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(q+' Busan')}
function naver(q){return 'https://map.naver.com/p/search/'+encodeURIComponent(q)}
function makeMap(type){const cfg={arrival:[['金海機場',12,72],['沙上',28,56],['西面',48,42],['海雲台',79,31],['廣安里',68,55]],haeundae:[['住宿',16,70],['尾浦',35,47],['青沙浦',66,33],['X the SKY',41,63],['Club D',56,72]],nampo:[['住宿',18,22],['Aria',42,42],['新東亞',59,60],['札嘎其',72,68],['富平',54,80]],shopping:[['Aria',18,68],['Centum',72,24],['田浦',46,46],['西面',38,58]],airport:[['Aria',72,30],['金海機場',20,72]]}[type];let s='<div class="mapbox"><div class="mapgrid"></div><div class="coast"></div>';cfg.forEach((x,i)=>{s+=`<span class="dot" style="left:${x[1]}%;top:${x[2]}%;color:${i==cfg.length-1?'#e47c6b':'#4478a8'}"></span><span class="label" style="left:${x[1]+2}%;top:${x[2]-2}%">${x[0]}</span>`});return s+'</div>'}
function render(){const tabs=document.getElementById('tabs'),days=document.getElementById('days');D.forEach((d,i)=>{tabs.innerHTML+=`<button class="tab ${i==0?'active':''}" onclick="goDay(${i})">${d.date.split('（')[0]}<br>${i+1}日</button>`;days.innerHTML+=`<section class="day ${i==0?'active':''}"><div class="title-card"><div class="dayno">DAY ${i+1}・${d.date}</div><h2>${d.title}</h2><div class="chips">${d.chips.map(c=>`<span class="chip">${c}</span>`).join('')}</div></div><div class="card"><h3>今日時間軸</h3><div class="timeline">${d.events.map(e=>`<div class="event"><span class="time">${e[0]}</span><b>${e[1]}</b><p>${e[2]}</p></div>`).join('')}</div></div><div class="card"><h3>今日路線</h3>${makeMap(d.map)}<div class="route"><div class="route-line">${d.route.map((r,j)=>`${j?'<span class="arrow">→</span>':''}<span class="stop">${r}</span>`).join('')}</div></div><div class="btns"><a class="btn" href="${maps(d.route.join(' '))}" target="_blank">開啟 Google Maps</a><a class="btn alt" href="${naver(d.route[d.route.length-1])}" target="_blank">NAVER 搜尋終點</a></div></div><div class="card"><h3>餐廳與甜點</h3><div class="food">${d.foods.map(f=>`<div class="food-item"><h4>${f[0]}</h4><div class="meta">${f[1]}<br><span class="highlight">${f[2]}</span></div><div class="btns"><a class="btn alt" href="${maps(f[0])}" target="_blank">Google</a><a class="btn alt" href="${naver(f[0])}" target="_blank">NAVER</a></div></div>`).join('')}</div><div class="warn">餐廳營業時間、休息日與最後點餐時間可能臨時更動，請在前一晚以 NAVER Map 顯示為準。</div></div><div class="card"><h3>當日預算</h3><div class="budget">${d.budget.map(b=>`<div>${b}</div>`).join('')}</div></div>${i==0?`<div class="card"><h3>住宿</h3><div class="hotel"><div class="hotel-card"><h4>ThePlace34</h4><div class="mini">8/6–8/8｜入住15:00<br>1381-5 Jung-dong, Haeundae</div></div><div class="hotel-card"><h4>Aria</h4><div class="mini">8/8–8/10｜入住16:00<br>중앙대로180번길, Busan 48822</div></div></div></div>`:''}${i==1?`<div class="card"><h3>釜山通行證</h3><p><b>建議買 24H Pass：₩55,000／人。</b>集中在 8/7 使用海岸列車、Busan X the SKY、Club D Oasis。天空膠囊通常需另外購票。</p><p class="note">官方目前仍提供 24H、48H、BIG 3、BIG 5。實際可免費進場項目以官方 App 當日顯示為準。</p></div>`:''}</section>`})}
function goDay(i){document.querySelectorAll('.day').forEach((x,j)=>x.classList.toggle('active',i==j));document.querySelectorAll('.tab').forEach((x,j)=>x.classList.toggle('active',i==j));window.scrollTo({top:150,behavior:'smooth'})}
render();
</script>
</body></html>
